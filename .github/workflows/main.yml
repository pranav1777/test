name:  ci cd for the test Application

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-java@v3
              with:
                distribution: 'temurin'
                java-version: '17'

            - run: mvn clean install
