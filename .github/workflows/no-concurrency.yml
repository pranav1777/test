name: No Concurrency Test

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Print Commit Info
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Message: ${{ github.event.head_commit.message }}"

      - name: Simulate Long Job
        run: |
          echo "Starting job..."
          sleep 30
          echo "Finished job"
